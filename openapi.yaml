      oneOf:
      - const: cpuAverageUtilization
        description: Scale replicas to maintain a target average CPU utilization across
          pods.
        title: CPU Average Utilization
      - const: httpRequestsConcurrency
        description: Scale replicas based on HTTP request concurrency using an external
          HTTP-aware autoscaler. The platform manages the underlying autoscaling resources
          on your behalf. This scaling option will scale to zero replicas when the
          proton is idle.
        title: HTTP Requests Concurrency
      - const: gpuCacheUtilization
        description: Scales replicas based on model-specific GPU memory cache utilization.
          This signal reflects how the model's KV cache is used during inference,
          when such metrics are exposed by the serving runtime. High cache utilization
          may indicate memory pressure and can be used to trigger scale-out to maintain
          throughput. Applicable to NIM Artifacts only.
        title: GPU Cache Utilization
      - const: gpuRequestQueueDepth
        description: Scales replicas based on the depth of the inference request queue.
          This metric represents the number of incoming requests waiting to be processed
          by the inference service. Increasing queue depth may indicate insufficient
          capacity and can be used to trigger additional replicas to reduce latency.
          Applicable to NIM Artifacts only.
        title: GPU Request Queue Depth
      title: ScalingMetricType
      type: string

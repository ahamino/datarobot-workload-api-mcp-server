        \ are enforced by the platform and are not user-settable. Elevated fields\
        \ (capabilities.add, allowPrivilegeEscalation=true, seccompProfile.type=Unconfined)\
        \ require the MLOps Admin role; regular users may only tighten defaults \u2014\
        \ drop capabilities, enable read-only rootfs, or set a RuntimeDefault/Localhost\
        \ seccomp profile."

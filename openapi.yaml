components:
  schemas:
    ANY_PERMISSION:
      const: '*'
      type: string
    ArtifactCloneRequest:
      additionalProperties: false
      properties:
        name:
          description: The name of the cloned artifact.
          maxLength: 5000
          minLength: 1
          title: Name
          type: string
      required:
      - name
      title: ArtifactCloneRequest
      type: object
    ArtifactFormatted:
      additionalProperties: false
      properties:
        artifactRepositoryId:
          anyOf:
          - type: string
          - type: 'null'
          description: ID of the artifact repository this artifact belongs to (for
            versioning support)
          title: Artifact Repository ID
        createdAt:
          description: Timestamp of when the entity was created
          format: date-time
          title: Created At
          type: string
        creator:
          anyOf:
          - $ref: '#/components/schemas/UserData'
          - type: 'null'
          description: Owner user details including ID, username and email
          title: Creator
        description:
          default: ''
          description: Description of the artifact
          title: Description
          type: string
        id:
          description: Unique identifier of the entity
          title: ID
          type: string
        name:
          description: Name of the entity
          title: Name
          type: string
        permissions:
          $ref: '#/components/schemas/ResourcePermissions'
          description: User permissions for this artifact
          title: Permissions
        spec:
          description: Artifact specification
          discriminator:
            mapping:
              nim: '#/components/schemas/NimArtifactSpec'
              service: '#/components/schemas/ServiceArtifactSpec'
            propertyName: type
          oneOf:
          - $ref: '#/components/schemas/ServiceArtifactSpec'
          - $ref: '#/components/schemas/NimArtifactSpec'
          title: Spec
        status:
          $ref: '#/components/schemas/ArtifactStatus'
          default: draft
          description: Artifact status
          title: Status
        tags:
          $ref: '#/components/schemas/Tags'
          description: Tags associated with this artifact
          title: Tags
        type:
          $ref: '#/components/schemas/ArtifactType'
          default: service
          description: Artifact type
          title: Type
        updatedAt:
          description: Timestamp of when the entity was last updated
          format: date-time
          title: Updated At
          type: string
        version:
          anyOf:
          - type: integer
          - type: 'null'
          description: Version number of the artifact (set only for locked artifacts)
          title: Version
      required:
      - id
      - name
      - createdAt
      - updatedAt
      - spec
      - artifactRepositoryId
      title: ArtifactFormatted
      type: object
    ArtifactInfoFormatted:
      description: Artifact basic information.
      properties:
        artifactRepositoryId:
          anyOf:
          - type: string
          - type: 'null'
          description: ID of the artifact repository this artifact belongs to (for
            versioning)
          title: Artifactrepositoryid
        id:
          description: Unique identifier of the entity
          title: Id
          type: string
        name:
          anyOf:
          - type: string
          - type: 'null'
          description: Name of the entity
          title: Name
        status:
          anyOf:
          - $ref: '#/components/schemas/ArtifactStatus'
          - type: 'null'
          description: Artifact status
        type:
          anyOf:
          - $ref: '#/components/schemas/ArtifactType'
          - type: 'null'
          description: Artifact type
        version:
          anyOf:
          - type: integer
          - type: 'null'
          description: Version number of the artifact (set only for locked artifacts)
          title: Version
      required:
      - id
      title: ArtifactInfoFormatted
      type: object
    ArtifactListResponse:
      additionalProperties: false
      properties:
        count:
          description: The number of records on this page.
          title: Count
          type: integer
        data:
          description: The list of records.
          items:
            $ref: '#/components/schemas/ArtifactFormatted'
          title: Data
          type: array
        next:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the next page, or `null` if there is no such page.
          title: Next
        previous:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the previous page, or `null` if there is no such
            page.
          title: Previous
        totalCount:
          description: The total number of records.
          title: Totalcount
          type: integer
      required:
      - totalCount
      - count
      - next
      - previous
      - data
      title: ArtifactListResponse
      type: object
    ArtifactRepositoryFormatted:
      additionalProperties: false
      properties:
        createdAt:
          description: Timestamp of when the entity was created
          format: date-time
          title: Created At
          type: string
        creator:
          anyOf:
          - $ref: '#/components/schemas/UserData'
          - type: 'null'
          description: Owner user details including ID, username and email
          title: Creator
        id:
          description: Unique identifier of the entity
          title: ID
          type: string
        lastVersionNumber:
          default: 0
          description: Last version number
          title: Lastversionnumber
          type: integer
        name:
          description: Name of the entity
          title: Name
          type: string
        numArtifacts:
          default: 0
          description: Number of artifacts in this repository
          minimum: 0.0
          title: Numartifacts
          type: integer
        permissions:
          $ref: '#/components/schemas/ResourcePermissions'
          description: User permissions for this artifact repository
        tags:
          $ref: '#/components/schemas/Tags'
          description: Tags for this repository
        type:
          $ref: '#/components/schemas/ArtifactType'
          default: service
          description: Repository type (inherited from the first originating artifact)
        updatedAt:
          description: Timestamp of when the entity was last updated
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - name
      - createdAt
      - updatedAt
      title: ArtifactRepositoryFormatted
      type: object
    ArtifactRepositoryListResponse:
      additionalProperties: false
      properties:
        count:
          description: The number of records on this page.
          title: Count
          type: integer
        data:
          description: The list of records.
          items:
            $ref: '#/components/schemas/ArtifactRepositoryFormatted'
          title: Data
          type: array
        next:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the next page, or `null` if there is no such page.
          title: Next
        previous:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the previous page, or `null` if there is no such
            page.
          title: Previous
        totalCount:
          description: The total number of records.
          title: Totalcount
          type: integer
      required:
      - totalCount
      - count
      - next
      - previous
      - data
      title: ArtifactRepositoryListResponse
      type: object
    ArtifactSortQueryParams:
      anyOf:
      - $ref: '#/components/schemas/CommonSortQueryParams'
      - const: status
        description: Sort by status in ascending order (e.g., STOPPED before RUNNING)
        title: Status Ascending
        type: string
      - const: -status
        description: Sort by status in descending order (e.g., RUNNING before STOPPED)
        title: Status Descending
        type: string
    ArtifactStatus:
      enum:
      - draft
      - locked
      title: ArtifactStatus
      type: string
    ArtifactType:
      description: 'Discriminator for the artifact spec variant. Used to label the
        workload, which may be used

        to prioritize the best matching operator available in the cluster for scheduling.

        Defaults to ``service`` when omitted.

        - ``service``: generic service artifact.

        - ``nim``: NVIDIA NIM model artifact.'
      enum:
      - service
      - nim
      title: ArtifactType
      type: string
    AutoscalingPolicy:
      additionalProperties: false
      description: Base class for autoscaling policies.
      properties:
        maxCount:
          description: Maximum number of replicas
          minimum: 0.0
          title: Max Count
          type: integer
        minCount:
          description: Minimum number of replicas
          minimum: 0.0
          title: Min Count
          type: integer
        priority:
          anyOf:
          - type: integer
          - type: 'null'
          description: Policy priority when multiple policies are defined
          title: Priority
        scalingMetric:
          $ref: '#/components/schemas/ScalingMetricType'
          description: Metric used for scaling decisions
          title: Scaling Metric
        target:
          description: Target value for the scaling metric
          minimum: 0.0
          title: Target
          type: number
      required:
      - scalingMetric
      - target
      - minCount
      - maxCount
      title: AutoscalingPolicy
      type: object
    AutoscalingProperties:
      additionalProperties: false
      description: Autoscaling configuration for a proton.
      properties:
        enabled:
          default: true
          description: Whether autoscaling is enabled
          title: Enabled
          type: boolean
        policies:
          items:
            $ref: '#/components/schemas/AutoscalingPolicy'
          title: Policies
          type: array
      required:
      - policies
      title: AutoscalingProperties
      type: object
    BundleSelectionPolicy:
      enum:
      - availability
      title: BundleSelectionPolicy
      type: string
    Capabilities:
      additionalProperties: false
      description: Linux capabilities to add or drop from the container.
      properties:
        add:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Capabilities to add
          title: Add
        drop:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Capabilities to drop
          title: Drop
      title: Capabilities
      type: object
    CodeRef:
      additionalProperties: false
      properties:
        datarobot:
          $ref: '#/components/schemas/DataRobotCodeRef'
        provider:
          const: datarobot
          default: datarobot
          title: Provider
          type: string
        type:
          const: datarobot
          default: datarobot
          title: Type
          type: string
      required:
      - datarobot
      title: CodeRef
      type: object
    CommonSortQueryParams:
      anyOf:
      - const: name
        description: Sort by name in ascending order (A-Z)
        title: Name Ascending
        type: string
      - const: -name
        description: Sort by name in descending order (Z-A)
        title: Name Descending
        type: string
      - const: createdAt
        description: Sort by creation date in ascending order (oldest first)
        title: Creation Date Ascending
        type: string
      - const: -createdAt
        description: Sort by creation date in descending order (newest first)
        title: Creation Date Descending
        type: string
      - const: updatedAt
        description: Sort by update date in ascending order (oldest first)
        title: Update Date Ascending
        type: string
      - const: -updatedAt
        description: Sort by update date in descending order (newest first)
        title: Update Date Descending
        type: string
    Container:
      additionalProperties: false
      properties:
        build:
          anyOf:
          - $ref: '#/components/schemas/ContainerBuildInfo'
          - type: 'null'
          description: Server-set image build metadata (e.g. after lock or draft build
            trigger). Workload API clears this on artifact create/update before persistence;
            clients must not rely on sending it.
        description:
          default: ''
          description: Description of the container
          title: Description
          type: string
        entrypoint:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Runtime entrypoint override for the container command. Independent
            of build entrypoint.
          title: Entrypoint
        environmentVars:
          default: []
          description: Environment variables
          items:
            anyOf:
            - $ref: '#/components/schemas/StringEnvironmentVariable'
            - $ref: '#/components/schemas/CredentialEnvironmentVariable'
          title: Environmentvars
          type: array
        imageBuildConfig:
          anyOf:
          - $ref: '#/components/schemas/ImageBuildConfig'
          - type: 'null'
          description: Configuration for server-side image builds from source code.
        imageUri:
          anyOf:
          - type: string
          - type: 'null'
          description: Docker Image URI. Required when imageBuildConfig is not set;
            server-populated after a successful image build.
          title: Imageuri
        livenessProbe:
          anyOf:
          - $ref: '#/components/schemas/ProbeConfig'
          - type: 'null'
          description: Container liveness check configuration
        name:
          anyOf:
          - type: string
          - type: 'null'
          description: Name of the container
          title: Name
        port:
          anyOf:
          - maximum: 65535.0
            minimum: 1024.0
            type: integer
          - type: 'null'
          description: Container access port. When set, must be >= 1024 for security
            and platform compatibility reasons. Primary containers must define a port;
            non-primary containers must omit it.
          title: Port
        primary:
          anyOf:
          - type: boolean
          - type: 'null'
          default: false
          description: Whether this is the primary container
          title: Primary
        readinessProbe:
          anyOf:
          - $ref: '#/components/schemas/ProbeConfig'
          - type: 'null'
          description: Container readiness check configuration
        securityContext:
          anyOf:
          - $ref: '#/components/schemas/SecurityContext'
          - type: 'null'
          description: Container security context
        startupProbe:
          anyOf:
          - $ref: '#/components/schemas/ProbeConfig'
          - type: 'null'
          description: Container startup check configuration
      title: Container
      type: object
    ContainerBuildInfo:
      additionalProperties: false
      description: Build reference embedded in a container spec when an image build
        is triggered.
      properties:
        artifactImageBuildId:
          description: Artifact Image Build ID
          title: Artifactimagebuildid
          type: string
        createdAt:
          description: Build creation timestamp (UTC)
          format: date-time
          title: Createdat
          type: string
        status:
          description: Image build reported status at submit time
          title: Status
          type: string
      required:
      - artifactImageBuildId
      - status
      - createdAt
      title: ContainerBuildInfo
      type: object
    ContainerGroup:
      additionalProperties: false
      properties:
        containers:
          default: []
          description: List of containers making this container group.
          items:
            $ref: '#/components/schemas/Container'
          title: Containers
          type: array
        name:
          default: default
          description: Name of the container group. Used as the lookup key for runtime
            overrides.
          title: Name
          type: string
      title: ContainerGroup
      type: object
    ContainerOverride:
      additionalProperties: false
      description: Runtime diff targeting a single named container within a group.
      properties:
        name:
          description: Container name. Must match a container declared in the artifact
            group.
          title: Name
          type: string
        resourceAllocation:
          anyOf:
          - $ref: '#/components/schemas/ResourceAllocation'
          - type: 'null'
          description: Resource allocation for this container. Required for multi-container
            groups.
      required:
      - name
      title: ContainerOverride
      type: object
    ContainerStatus:
      description: Lifecycle state of a container within a deployment replica.
      enum:
      - running
      - waiting
      - terminated
      - unknown
      title: ContainerStatus
      type: string
    ContainerStatusDetail:
      additionalProperties: false
      properties:
        image:
          title: Image
          type: string
        name:
          title: Name
          type: string
        ready:
          title: Ready
          type: boolean
        restartCount:
          title: Restartcount
          type: integer
        startedAt:
          anyOf:
          - type: string
          - type: 'null'
          title: Startedat
        status:
          $ref: '#/components/schemas/ContainerStatus'
      required:
      - name
      - status
      - startedAt
      - ready
      - restartCount
      - image
      title: ContainerStatusDetail
      type: object
    CreateWorkloadRequest:
      additionalProperties: false
      description: Request to create a new workload.
      properties:
        artifact:
          anyOf:
          - $ref: '#/components/schemas/InputArtifact'
          - type: 'null'
          description: Inline artifact spec to create and deploy in one step
          title: Artifact
        artifactId:
          anyOf:
          - type: string
          - type: 'null'
          description: ID of an existing artifact to deploy
          title: Artifact ID
        description:
          anyOf:
          - type: string
          - type: 'null'
          description: Workload description
          title: Description
        importance:
          $ref: '#/components/schemas/WorkloadImportance'
          default: low
          description: Workload importance level
          title: Importance
        name:
          description: Workload name
          maxLength: 5000
          minLength: 1
          title: Name
          type: string
        runtime:
          $ref: '#/components/schemas/WorkloadRuntime'
          description: Runtime configuration
          title: Runtime
      required:
      - name
      title: CreateWorkloadRequest
      type: object
    CredentialEnvironmentVariable:
      properties:
        drCredentialId:
          description: ID of the DataRobot credential to use
          title: DR Credential ID
          type: string
        key:
          description: Key within the credential
          title: Key
          type: string
        name:
          description: Name of the environment variable
          title: Name
          type: string
        source:
          const: dr-credential
          title: Source
          type: string
      required:
      - source
      - name
      - drCredentialId
      - key
      title: CredentialEnvironmentVariable
      type: object
    DataRobotCodeRef:
      additionalProperties: false
      properties:
        catalogId:
          title: Catalogid
          type: string
        catalogVersionId:
          title: Catalogversionid
          type: string
      required:
      - catalogId
      - catalogVersionId
      title: DataRobotCodeRef
      type: object
    GeneratedDockerfile:
      additionalProperties: false
      description: System generates a Dockerfile from execution environment metadata.
      properties:
        entrypoint:
          description: Entrypoint baked into the generated Dockerfile CMD (e.g. ["python",
            "app.py"]).
          items:
            type: string
          minItems: 1
          title: Entrypoint
          type: array
        executionEnvironmentId:
          description: Execution environment ID used to resolve the base Docker image.
          title: Execution Environment ID
          type: string
        executionEnvironmentVersionId:
          description: Execution environment version ID that pins the exact base image
            tag.
          title: Execution Environment Version ID
          type: string
        source:
          const: generated
          default: generated
          title: Source
          type: string
      required:
      - executionEnvironmentId
      - executionEnvironmentVersionId
      - entrypoint
      title: GeneratedDockerfile
      type: object
    GrantAccessControlWithId:
      additionalProperties: false
      description: 'Grant access control request using ID for recipient identification.


        Can be used for users, groups, or organizations.'
      properties:
        id:
          description: The ID of the recipient.
          title: Id
          type: string
        role:
          $ref: '#/components/schemas/SharingRole'
          description: The role of the recipient on this entity.
        shareRecipientType:
          $ref: '#/components/schemas/SubjectType'
          description: The type of the recipient.
      required:
      - shareRecipientType
      - role
      - id
      title: GrantAccessControlWithId
      type: object
    GrantAccessControlWithUsername:
      additionalProperties: false
      description: Grant access control request using username for user identification.
      properties:
        role:
          $ref: '#/components/schemas/SharingRole'
          description: The role of the recipient on this entity.
        shareRecipientType:
          $ref: '#/components/schemas/SubjectType'
          description: The type of the recipient.
        username:
          description: Username of the user to update the access role for.
          title: Username
          type: string
      required:
      - shareRecipientType
      - role
      - username
      title: GrantAccessControlWithUsername
      type: object
    GroupRuntime:
      additionalProperties: false
      description: Runtime configuration for a single container group.
      properties:
        autoscaling:
          anyOf:
          - $ref: '#/components/schemas/AutoscalingProperties'
          - type: 'null'
          description: Autoscaling configuration for this group. Takes precedence
            over replicaCount.
        bundleSelectionPolicy:
          $ref: '#/components/schemas/BundleSelectionPolicy'
          default: availability
          description: 'How to select among resourceBundles. Default: availability.'
        containers:
          description: Per-container overrides for this group.
          items:
            $ref: '#/components/schemas/ContainerOverride'
          title: Containers
          type: array
        name:
          default: default
          description: Group name. Must match a container group name declared in the
            artifact.
          title: Name
          type: string
        replicaCount:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          default: 1
          description: Number of replicas. Cannot be set alongside autoscaling.enabled=true.
          title: Replicacount
        resolvedBundle:
          anyOf:
          - $ref: '#/components/schemas/ResolvedBundle'
          - type: 'null'
          description: Full details of the bundle selected at scheduling time. Read-only.
          readOnly: true
        resourceBundles:
          description: Ordered list of bundle IDs. One is selected at scheduling time.
          items:
            type: string
          title: Resourcebundles
          type: array
      title: GroupRuntime
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ImageBuildConfig:
      additionalProperties: false
      description: User-provided configuration for server-side image builds from source
        code.
      properties:
        codeRef:
          anyOf:
          - $ref: '#/components/schemas/CodeRef'
          - type: 'null'
          description: Reference to source code (e.g. Files API catalog). Optional
            at create time; required before build or lock.
        dockerfile:
          description: How the Dockerfile is obtained. Defaults to using ./Dockerfile
            from the source code.
          discriminator:
            mapping:
              generated: '#/components/schemas/GeneratedDockerfile'
              provided: '#/components/schemas/ProvidedDockerfile'
            propertyName: source
          oneOf:
          - $ref: '#/components/schemas/ProvidedDockerfile'
          - $ref: '#/components/schemas/GeneratedDockerfile'
          title: Dockerfile
      title: ImageBuildConfig
      type: object
    ImageBuildExternalStatus:
      description: Client-facing artifact image build status.
      enum:
      - PENDING
      - IN_PROGRESS
      - BUILT
      - COMPLETED
      - CANCELLED
      - FAILED
      - UNKNOWN
      title: ImageBuildExternalStatus
      type: string
    ImageBuildFormatted:
      additionalProperties: false
      description: "Build row formatted for GET \u2026/builds (same base fields as\
        \ other `*Formatted` API models)."
      properties:
        artifactId:
          description: Parent artifact id
          title: Artifact Id
          type: string
        createdAt:
          description: Timestamp of when the entity was created
          format: date-time
          title: Created At
          type: string
        creator:
          anyOf:
          - $ref: '#/components/schemas/UserData'
          - type: 'null'
          description: Owner user details including ID, username and email
          title: Creator
        id:
          description: Unique identifier of the entity
          title: ID
          type: string
        name:
          description: Name of the entity
          title: Name
          type: string
        status:
          $ref: '#/components/schemas/ImageBuildExternalStatus'
          default: UNKNOWN
          description: Reported build status
          title: Build Status
        updatedAt:
          description: Timestamp of when the entity was last updated
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - name
      - createdAt
      - updatedAt
      - artifactId
      title: ImageBuildFormatted
      type: object
    ImageBuildFormattedList:
      additionalProperties: false
      description: "Paginated list of formatted artifact image builds for GET \u2026\
        /builds."
      properties:
        count:
          description: The number of records on this page.
          title: Count
          type: integer
        data:
          description: The list of records.
          items:
            $ref: '#/components/schemas/ImageBuildFormatted'
          title: Data
          type: array
        next:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the next page, or `null` if there is no such page.
          title: Next
        previous:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the previous page, or `null` if there is no such
            page.
          title: Previous
        totalCount:
          description: The total number of records.
          title: Totalcount
          type: integer
      required:
      - totalCount
      - count
      - next
      - previous
      - data
      title: ImageBuildFormattedList
      type: object
    ImageBuildTriggerResponse:
      additionalProperties: false
      description: Response after requesting image build(s) for a draft artifact.
      properties:
        buildIds:
          description: Workload API artifact image build document ids (Mongo ObjectId
            strings), one per distinct Files API catalog/version pair. Internal image
            build ids are not returned.
          items:
            type: string
          title: Buildids
          type: array
      required:
      - buildIds
      title: ImageBuildTriggerResponse
      type: object
    InputArtifact:
      additionalProperties: false
      description: Request to create an artifact. An artifact is always created as
        a draft.
      properties:
        artifactRepositoryId:
          anyOf:
          - type: string
          - type: 'null'
          description: ID of the artifact repository this artifact belongs to (for
            versioning support)
          title: Artifactrepositoryid
        description:
          default: ''
          description: Description of the artifact
          title: Description
          type: string
        name:
          description: Name of the artifact
          maxLength: 5000
          minLength: 1
          title: Name
          type: string
        spec:
          description: Artifact specification
          discriminator:
            mapping:
              nim: '#/components/schemas/NimArtifactSpec'
              service: '#/components/schemas/ServiceArtifactSpec'
            propertyName: type
          oneOf:
          - $ref: '#/components/schemas/ServiceArtifactSpec'
          - $ref: '#/components/schemas/NimArtifactSpec'
          title: Spec
        status:
          $ref: '#/components/schemas/ArtifactStatus'
          default: draft
          description: Artifact status
        type:

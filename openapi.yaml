          anyOf:
          - $ref: '#/components/schemas/SeccompProfile'
          - type: 'null'
          description: Seccomp profile for the container
      title: SecurityContext
      type: object
    ServiceArtifactSpec:
      additionalProperties: false
      properties:
        containerGroups:
          default: []
          description: List of container groups.
          items:
            $ref: '#/components/schemas/ContainerGroup'
          title: Containergroups
          type: array
        type:
          const: service
          default: service
          description: "Artifact type discriminator. Injected automatically from the\
            \ top-level `type` field \u2014 do not set this directly."
          title: Type
          type: string
      title: ServiceArtifactSpec
      type: object
    SharedRole:
      additionalProperties: false
      description: 'Represents a recipient (user, group, or organization) with access
        to an entity.


        This model is used for listing and managing access control on shared resources,

        providing information about who has access and what role they have.'
      properties:
        id:
          description: The identifier of the recipient.
          title: Id
          type: string
        name:
          description: The name of the recipient.
          title: Name
          type: string
        role:
          $ref: '#/components/schemas/SharingRole'
          description: The role of the recipient on this entity.
        shareRecipientType:
          $ref: '#/components/schemas/SubjectType'
          description: The type of the recipient.
      required:
      - id
      - name
      - shareRecipientType
      - role
      title: SharedRole
      type: object
    SharedRoleListResponse:
      additionalProperties: false
      properties:
        count:
          description: The number of records on this page.
          title: Count
          type: integer
        data:
          description: The list of records.
          items:
            $ref: '#/components/schemas/SharedRole'
          title: Data
          type: array
        next:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the next page, or `null` if there is no such page.
          title: Next
        previous:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the previous page, or `null` if there is no such
            page.
          title: Previous
        totalCount:
          description: The total number of records.
          title: Totalcount
          type: integer
      required:
      - totalCount
      - count
      - next
      - previous
      - data
      title: SharedRoleListResponse
      type: object
    SharedRolesUpdateRequest:
      additionalProperties: false
      description: 'Request model for updating shared roles on an entity.


        Used to grant access, remove access, or update roles for organizations,

        groups, or users. Up to 100 roles may be set in a single request.'
      properties:
        operation:
          const: updateRoles
          description: Name of the action being taken. The only operation is 'updateRoles'.
          title: Operation
          type: string
        roles:
          description: Array of GrantAccessControl objects, up to maximum 100 objects.
          items:
            anyOf:
            - $ref: '#/components/schemas/GrantAccessControlWithUsername'
            - $ref: '#/components/schemas/GrantAccessControlWithId'
          maxItems: 100
          minItems: 1
          title: Roles
          type: array
      required:
      - operation
      - roles
      title: SharedRolesUpdateRequest
      type: object
    SharingRole:
      description: 'External sharing roles representing the permission level a user,
        group or

        organization holds on an entity.


        These roles map to internal permissions and are used in sharing APIs.'
      enum:
      - NO_ROLE
      - OWNER
      - READ_WRITE
      - EDITOR
      - USER
      - DATA_SCIENTIST
      - ADMIN
      - READ_ONLY
      - CONSUMER
      - OBSERVER
      title: SharingRole
      type: string
    StringEnvironmentVariable:
      properties:
        name:
          description: Name of the environment variable
          title: Name
          type: string
        source:
          const: string
          default: string
          title: Source
          type: string
        value:
          description: Value of the environment variable
          title: Value
          type: string
      required:
      - name
      - value
      title: StringEnvironmentVariable
      type: object
    SubjectType:
      description: Enum of possible subject types.
      enum:
      - user
      - group
      - organization
      - role
      title: SubjectType
      type: string
    Summary:
      additionalProperties: false
      description: Summary information for proton statistics.
      properties:
        period:
          $ref: '#/components/schemas/Period'
          description: Time period for the summary
        protonId:
          description: Proton ID
          title: Protonid
          type: string
      required:
      - protonId
      - period
      title: Summary
      type: object
    TagInfo:
      additionalProperties: false
      properties:
        id:
          description: Unique identifier of the tag
          title: Id
          type: string
        name:
          description: Name of the tag
          title: Name
          type: string
        value:
          description: Value of the tag
          title: Value
          type: string
      required:
      - id
      - name
      - value
      title: TagInfo
      type: object
    Tags:
      items:
        $ref: '#/components/schemas/TagInfo'
      type: array
    UpdateArtifactRequest:
      additionalProperties: false
      description: 'Request to update an artifact.


        When updating an artifact, the user_id and tenant_id cannot be changed.

        Currently transferring of ownership of an artifact is not supported.'
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          description: Description of the artifact
          title: Description
        name:
          anyOf:
          - maxLength: 5000
            minLength: 1
            type: string
          - type: 'null'
          description: Name of the artifact
          title: Name
        spec:
          anyOf:
          - $ref: '#/components/schemas/MultiContainerArtifactSpec'
          - type: 'null'
          description: Artifact specification
        status:
          anyOf:
          - $ref: '#/components/schemas/ArtifactStatus'
          - type: 'null'
          description: Artifact status
      title: UpdateArtifactRequest
      type: object
    UpdateSettingsRequest:
      additionalProperties: false
      description: Request to update runtime settings for a workload.
      properties:
        runtime:
          $ref: '#/components/schemas/WorkloadRuntime'
          description: Runtime configuration to apply to the workload
      required:
      - runtime
      title: UpdateSettingsRequest
      type: object
    UpdateWorkloadRequest:
      additionalProperties: false
      description: Request to update an existing workload.
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          description: Updated workload description
          title: Description
        importance:
          anyOf:
          - $ref: '#/components/schemas/WorkloadImportance'
          - type: 'null'
          description: Updated workload importance level
        name:
          anyOf:
          - maxLength: 5000
            minLength: 1
            type: string
          - type: 'null'
          description: Updated workload name
          title: Name
      title: UpdateWorkloadRequest
      type: object
    UserData:
      additionalProperties: false
      description: User information embedded in API responses.
      properties:
        email:
          anyOf:
          - type: string
          - type: 'null'
          description: User email address
          title: Email
        fullName:
          anyOf:
          - type: string
          - type: 'null'
          description: User's full name
          title: Full Name
        id:
          description: User ID associated with this resource
          title: User ID
          type: string
        userhash:
          anyOf:
          - type: string
          - type: 'null'
          description: User's gravatar hash
          title: Userhash
        username:
          anyOf:
          - type: string
          - type: 'null'
          description: Username
          title: Username
      required:
      - id
      title: UserData
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    WorkloadEvent:
      additionalProperties: false
      description: 'A single workload event record.


        Note: full event schema will be defined once event storage is implemented
        (P7).

        This placeholder documents the known shape.'
      properties:
        actorId:
          anyOf:
          - type: string
          - type: 'null'
          description: ID of the user or system that triggered the event
          title: Actor ID
        details:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Additional event-specific details
          title: Details
        eventType:
          description: Type of event
          title: Event Type
          type: string
        id:
          description: Event ID
          title: ID
          type: string
        timestamp:
          description: When the event occurred
          format: date-time
          title: Timestamp
          type: string
        workloadId:
          description: ID of the workload this event belongs to
          title: Workload ID
          type: string
      required:
      - id
      - workloadId
      - timestamp
      - eventType
      title: WorkloadEvent
      type: object
    WorkloadEventsResponse:
      additionalProperties: false
      description: Response containing workload events.
      properties:
        count:
          description: The number of records on this page.
          title: Count
          type: integer
        data:
          description: The list of records.
          items:
            $ref: '#/components/schemas/WorkloadEvent'
          title: Data
          type: array
        next:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the next page, or `null` if there is no such page.
          title: Next
        previous:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the previous page, or `null` if there is no such
            page.
          title: Previous
        totalCount:
          description: The total number of records.
          title: Totalcount
          type: integer
      required:
      - totalCount
      - count
      - next
      - previous
      - data
      title: WorkloadEventsResponse
      type: object
    WorkloadFormatted:
      additionalProperties: false
      description: 'API representation of a workload.

        This is the formatted version returned to clients, excluding internal fields

        and including computed properties like permissions and statistics.'
      properties:
        artifact:
          anyOf:
          - $ref: '#/components/schemas/ArtifactInfoFormatted'
          - type: 'null'
          description: Basic information about the currently active artifact for this
            workload
          title: Artifact
        artifactId:
          anyOf:
          - type: string
          - type: 'null'
          description: ID of the currently active artifact for this workload
          title: Artifact ID
        createdAt:
          description: Timestamp of when the entity was created
          format: date-time
          title: Created At
          type: string
        creator:
          anyOf:
          - $ref: '#/components/schemas/UserData'
          - type: 'null'
          description: Owner user details including ID, username and email
          title: Creator
        description:
          anyOf:
          - type: string
          - type: 'null'
          default: ''
          description: Workload description
          title: Description
        endpoint:
          anyOf:
          - type: string
          - type: 'null'
          description: Workload endpoint URL
          title: Endpoint
        id:
          description: Unique identifier of the entity
          title: ID
          type: string
        importance:
          $ref: '#/components/schemas/WorkloadImportance'
          default: low
          description: Workload importance level
          title: Importance
        lastResponse:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: Timestamp of the last response received from this workload
          title: Last Response Time
        name:
          description: Name of the entity
          title: Name
          type: string
        owners:
          description: List of workload owners
          items:
            $ref: '#/components/schemas/UserData'
          title: Owners
          type: array
        permissions:
          $ref: '#/components/schemas/ResourcePermissions'
          description: User permissions for this workload
          title: Permissions
        protonId:
          anyOf:
          - type: string
          - type: 'null'
          description: ID of the currently active proton for this workload
          title: Proton ID
        replacement:
          anyOf:
          - $ref: '#/components/schemas/WorkloadReplacementFormatted'
          - type: 'null'
          description: Information about an active replacement process for this workload,
            if any
          title: Replacement
        requestStats:
          anyOf:
          - $ref: '#/components/schemas/RequestStats'
          - type: 'null'
          description: Request statistics for this workload
          title: Request Stats
        runtime:
          $ref: '#/components/schemas/WorkloadRuntime'
          description: Runtime configuration sourced from the current proton
          title: Runtime
        status:
          $ref: '#/components/schemas/ProtonStatus'
          default: unknown
          description: Current proton status
          title: Status
        tags:
          $ref: '#/components/schemas/Tags'
          description: Tags associated with this workload
          title: Tags
        type:
          $ref: '#/components/schemas/ArtifactType'
          default: service
          description: Workload artifact type
          title: Type
        updatedAt:
          description: Timestamp of when the entity was last updated
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - name
      - createdAt
      - updatedAt
      title: WorkloadFormatted
      type: object
    WorkloadImportance:
      description: Importance level for workloads.
      enum:
      - critical
      - high
      - moderate
      - low
      title: WorkloadImportance
      type: string
    WorkloadListResponse:
      additionalProperties: false
      properties:
        count:
          description: The number of records on this page.
          title: Count
          type: integer
        data:
          description: The list of records.
          items:
            $ref: '#/components/schemas/WorkloadFormatted'
          title: Data
          type: array
        next:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the next page, or `null` if there is no such page.
          title: Next
        previous:
          anyOf:
          - type: string
          - type: 'null'
          description: The URL to the previous page, or `null` if there is no such
            page.
          title: Previous
        totalCount:
          description: The total number of records.
          title: Totalcount
          type: integer
      required:
      - totalCount
      - count
      - next
      - previous
      - data
      title: WorkloadListResponse
      type: object
    WorkloadMonitorOverallStatus:
      additionalProperties: false
      description: Overall status as reported by the workload-monitor service.
      properties:
        lastUpdated:
          description: RFC3339 timestamp of the last state transition
          title: Lastupdated
          type: string
        state:
          $ref: '#/components/schemas/ProtonStatus'
          description: Proton state mapped to team-owned ProtonStatus
        summary:
          description: Human-readable description of the current state
          title: Summary
          type: string
      required:
      - state
      - summary
      - lastUpdated
      title: WorkloadMonitorOverallStatus
      type: object
    WorkloadOperationResponse:
      additionalProperties: false
      description: 'Acknowledgement returned by asynchronous workload lifecycle operations
        (start/stop).


        The operation has been accepted and queued. Poll ``GET /workloads/{workloadId}``

        to observe the resulting status transition.'
      properties:
        status:
          description: Human-readable description of the operation outcome.
          title: Status
          type: string
        trackVia:
          description: URL to poll in order to observe the status transition.
          title: Track Via
          type: string
        workloadId:
          description: ID of the workload on which the operation was requested.
          title: Workload ID
          type: string
      required:
      - status
      - workloadId
      - trackVia
      title: WorkloadOperationResponse
      type: object
    WorkloadReplacementFormatted:
      description: Formatted replacement information for API responses.
      properties:
        candidateProtonIds:
          description: IDs of protons pending promotion during artifact replacement
          items:
            type: string
          title: Candidateprotonids
          type: array
        status:
          $ref: '#/components/schemas/ReplacementStatus'
          default: unknown
          description: Replacement status
        strategy:
          $ref: '#/components/schemas/ReplacementStrategy'
          default: rolling
          description: Replacement strategy
      title: WorkloadReplacementFormatted
      type: object
    WorkloadRuntime:
      additionalProperties: false
      description: 'Runtime configuration for a workload.


        For service and nim artifacts, all configuration is scoped inside

        ``container_groups``, each identified by name matching the artifact topology.'
      properties:
        containerGroups:
          description: Per-group runtime configuration. Each entry's name must match
            a group in the artifact.
          items:
            $ref: '#/components/schemas/GroupRuntime'
          title: Containergroups
          type: array
      title: WorkloadRuntime
      type: object
    WorkloadSettingsResponse:
      additionalProperties: false
      description: Response containing workload settings.
      properties:
        runtime:
          $ref: '#/components/schemas/WorkloadRuntime'
          description: Runtime configuration sourced from the current proton
      title: WorkloadSettingsResponse
      type: object
    WorkloadSortQueryParam:
      anyOf:
      - $ref: '#/components/schemas/CommonSortQueryParams'
      - const: status
        description: Sort by status in ascending order (e.g., STOPPED before RUNNING)
        title: Status Ascending
        type: string
      - const: -status
        description: Sort by status in descending order (e.g., RUNNING before STOPPED)
        title: Status Descending
        type: string
      - const: importance
        description: Sort by importance in ascending order (least important first)
        title: Importance Ascending
        type: string
      - const: -importance
        description: Sort by importance in descending order (most important first)
        title: Importance Descending
        type: string
    WorkloadStatsMetricName:
      description: Metric names for workload statistics.
      enum:
      - totalRequests
      - requestsOverN
      - requestsPerMinute
      - concurrentRequests
      - responseTime
      - totalErrorRate
      title: WorkloadStatsMetricName
      type: string
    WorkloadStatsResponse:
      additionalProperties: false
      description: Response containing workload statistics.
      properties:
        concurrentRequests:
          $ref: '#/components/schemas/WorkloadsConcurrentRequestsStats'
          description: Concurrent requests statistics
        errorRate:
          $ref: '#/components/schemas/WorkloadsErrorRateStats'
          description: Error rate statistics
        requests:
          $ref: '#/components/schemas/WorkloadsRequestsStats'
          description: Request statistics across all workloads
        responseTime:
          $ref: '#/components/schemas/WorkloadsResponseTimeStats'
          description: Response time statistics
        workloads:
          $ref: '#/components/schemas/WorkloadsCountStats'
          description: Workload count statistics
      title: WorkloadStatsResponse
      type: object
    WorkloadsConcurrentRequestsStats:
      additionalProperties: false
      description: Workload concurrent requests statistics.
      properties:
        count:
          default: 0
          description: Number of concurrent requests
          title: Count
          type: integer
        trend:
          default: 0.0
          description: Trend indicator (positive = increasing)
          title: Trend
          type: number
      title: WorkloadsConcurrentRequestsStats
      type: object
    WorkloadsCountStats:
      additionalProperties: false
      description: Workload count statistics.
      properties:
        active:
          default: 0
          description: Number of active workloads
          title: Active
          type: integer
        total:
          default: 0
          description: Total number of workloads
          title: Total
          type: integer
      title: WorkloadsCountStats
      type: object
    WorkloadsErrorRateStats:
      additionalProperties: false
      description: Workload error rate statistics.
      properties:
        rate:
          default: 0.0
          description: Error rate percentage
          title: Rate
          type: number
        trend:
          default: 0.0
          description: Trend indicator (positive = increasing)
          title: Trend
          type: number
      title: WorkloadsErrorRateStats
      type: object
    WorkloadsRequestsStats:
      additionalProperties: false
      description: Workload request statistics.
      properties:
        failed:
          default: 0
          description: Number of failed requests
          title: Failed
          type: integer
        succeeded:
          default: 0
          description: Number of successful requests
          title: Succeeded
          type: integer
        total:
          default: 0
          description: Total number of requests
          title: Total
          type: integer
        trend:
          default: 0.0
          description: Trend indicator (positive = increasing)
          title: Trend
          type: number
      title: WorkloadsRequestsStats
      type: object
    WorkloadsResponseTimeStats:
      additionalProperties: false
      description: Workload response time statistics.
      properties:
        millis:
          default: 0
          description: Response time in milliseconds
          title: Millis
          type: integer
        trend:
          default: 0.0
          description: Trend indicator (positive = increasing)
          title: Trend
          type: number
      title: WorkloadsResponseTimeStats
      type: object
info:
  contact:
    email: genai-systems-devs@datarobot.com
    name: GenAI Systems
  description: Customer-facing API for deploying and managing AI workloads.
  license:
    name: DataRobot Proprietary
  title: Workload API
  version: '11.5'
openapi: 3.1.0
paths:
  /artifactRepositories:
    get:
      description: Returns the list of artifact repositories.
      operationId: listArtifactRepositories
      parameters:
      - description: Skip the specified number of values.
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Skip the specified number of values.
          minimum: 0
          title: Offset
          type: integer
      - description: Retrieve only the specified number of values.
        in: query
        name: limit
        required: false
        schema:
          default: 10
          description: Retrieve only the specified number of values.
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      - description: Filters by those created by the given user.
        in: query
        name: createdBy
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filters by those created by the given user.
          title: Created By
      - description: Filter by specific IDs
        in: query
        name: ids
        required: false
        schema:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Filter by specific IDs
          title: Ids
      - description: Case insensitive search against name, description and partial
          ID.
        in: query
        name: search
        required: false
        schema:
          anyOf:
          - maxLength: 100
            type: string
          - type: 'null'
          description: Case insensitive search against name, description and partial
            ID.
          title: Search
      - description: List of tag keys to filter for. If multiple values are specified,
          results with tags that match any of the values will be returned.
        in: query
        name: tagKeys
        required: false
        schema:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: List of tag keys to filter for. If multiple values are specified,
            results with tags that match any of the values will be returned.
          title: Tag Keys
      - description: List of tag values to filter for. If multiple values are specified,
          results with tags that match any of the values will be returned.
        in: query
        name: tagValues
        required: false
        schema:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: List of tag values to filter for. If multiple values are specified,
            results with tags that match any of the values will be returned.
          title: Tag Values
      - description: Select a sorting strategy from the list.
        in: query
        name: orderBy
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/CommonSortQueryParams'
          - type: 'null'
          description: Select a sorting strategy from the list.
          title: Order By
      - description: Filters artifacts by their type (e.g., service, nim).
        in: query
        name: type
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/ArtifactType'
          - type: 'null'
          description: Filters artifacts by their type (e.g., service, nim).
          title: Type
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactRepositoryListResponse'
          description: Successful Response
        '401':
          description: Unauthenticated
        '403':
          description: Insufficient permissions
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Artifact Repositories
      tags:
      - artifacts
  /artifactRepositories/{artifact_repository_id}:
    delete:
      description: Delete an artifact repository. Artifacts within the repository
        are cascade-deleted unless they are locked or still in use by workloads.
      operationId: deleteArtifactRepository
      parameters:
      - description: Artifact Repository ID
        in: path
        name: artifact_repository_id
        required: true
        schema:
          description: Artifact Repository ID
          title: Artifact Repository Id
          type: string
      responses:
        '204':
          description: Successful Response
        '401':
          description: Unauthenticated
        '403':
          description: Insufficient permissions
        '404':
          description: Artifact repository not found
        '409':
          description: Repository contains locked artifacts or artifacts in use by
            workloads
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete Artifact Repository
      tags:
      - artifacts
    get:
      description: Get a specific artifact repository by ID.
      operationId: getArtifactRepository
      parameters:
      - description: Artifact Repository ID
        in: path
        name: artifact_repository_id
        required: true
        schema:
          description: Artifact Repository ID
          title: Artifact Repository Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactRepositoryFormatted'
          description: Successful Response
        '401':
          description: Unauthenticated
        '403':
          description: Insufficient permissions
        '404':
          description: Artifact repository not found
        '422':
          content:
